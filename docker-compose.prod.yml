# Production Docker Compose for the TypeScript full-stack
# (replaces the legacy Python stack). Run with --env-file to inject
# passwords; the example values below are placeholders.
version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: safety-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-safety_hazard}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: safety-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: safety-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: safety-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-safety_hazard}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?}
      MINIO_BUCKET: ${MINIO_BUCKET:-hazard-photos}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY to a 32+ char string}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      PORT: "8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    restart: unless-stopped

  # BullMQ worker (report generation, notification cleanup, statistics jobs)
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    container_name: safety-worker
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-safety_hazard}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?}
      MINIO_BUCKET: ${MINIO_BUCKET:-hazard-photos}
      SECRET_KEY: ${SECRET_KEY:?}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    restart: unless-stopped

  # Next.js frontend (standalone build)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: safety-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: /api/v1
      PORT: "3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx in front of frontend + backend
  nginx:
    image: nginx:alpine
    container_name: safety-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
