# Production Nginx for the TypeScript full-stack.
# - /api/v1/      → backend:8000
# - /api/v1/photos/*/image  → 4MB body for photos
# - /             → frontend:3000 (Next.js)
# - /health       → backend:8000 (no auth)
# - /metrics      → backend:8000 (Phase 5: prometheus)

worker_processes auto;
events { worker_connections 4096; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  client_max_body_size 50M;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json text/css application/javascript application/xml;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # CSP allows the front-end to display blob/data images (signed photo URLs)
  # and fonts. Inline styles are required by AntD SSR; no inline scripts.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'; connect-src 'self' http: https:;" always;

  # /api/v1/ → NestJS
  upstream backend {
    server backend:8000;
    keepalive 32;
  }

  # / → Next.js standalone
  upstream frontend {
    server frontend:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;
    server_tokens off;

    # Photo upload / download — large body
    client_max_body_size 50M;

    # Health / metrics (no auth, used by load balancer / monitoring)
    location = /health { proxy_pass http://backend/health; access_log off; }
    location = /metrics { proxy_pass http:¬js/metrics; }

    # API reverse proxy
    location /api/ {
      proxy_pass http://backend/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # Everything else → Next.js
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
