services:
  postgres:
    image: postgres:16-alpine
    profiles: ["infra", "all"]
    environment:
      POSTGRES_USER: shr
      POSTGRES_PASSWORD: shr_dev_pwd
      POSTGRES_DB: shr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shr -d shr"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    profiles: ["infra", "all"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev_pwd
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 容器内 app（生产形态）。本机 dev 走 `npm run dev`，不走这个。
  # 拉取 node:20-alpine 受限时改用本地其它基础镜像，或先 `docker load` 离线包。
  app:
    build: .
    profiles: ["all"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://shr:shr_dev_pwd@postgres:5432/shr?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_dev_pwd
      MINIO_BUCKET: shr-photos
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
