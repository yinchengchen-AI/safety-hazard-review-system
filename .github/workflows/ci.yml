name: ci
on:
  push:
    branches: [master, feat/fullstack-ts]
  pull_request:
    branches: [master, feat/fullstack-ts]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: safety_hazard_test
        ports: ['5433:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/safety_hazard_test
          REDIS_URL: redis://localhost:6379/0
          ENV: test
          SECRET_KEY: dev-secret-32chars-minimum-placeholder-x
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/safety_hazard_test
          REDIS_URL: redis://localhost:6379/0
          ENV: test
          SECRET_KEY: dev-secret-32chars-minimum-placeholder-x
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run build
      - run: npm run lint
